name: Build and test

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ 8, 11, 17, 21, 25 ]
        netty-profile: [ netty-4.1, netty-4.2 ]
    name: Java ${{ matrix.java }} / ${{ matrix.netty-profile }} build
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: 'maven'
      - name: Build with Maven on JDK ${{ matrix.java }} and ${{ matrix.netty-profile }}
        run: mvn --batch-mode --update-snapshots -P${{ matrix.netty-profile }} verify